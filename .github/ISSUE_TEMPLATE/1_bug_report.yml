name: '🐛 Bug Report | 反馈缺陷'
description: 'Report a bug | 反馈一个问题缺陷'
title: '[Bug] '
labels: '🐛 Bug'
body:
  - type: dropdown
    attributes:
      label: 'Operating System | 系统环境'
      options:
        - Windows
        - macOS
        - Ubuntu
        - Other Linux
        - Other
    validations:
      required: true
  - type: dropdown
    attributes:
      label: 'Browser | 浏览器'
      options:
        - Chrome
        - Edge
        - Safari
        - Firefox
        - Other
    validations:
      required: true
  - type: textarea
    attributes:
      label: 'Bug Description | 问题描述'
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: 'Expected Behavior | 期望结果'
      description: A clear and concise description of what you expected to happen.
  - type: textarea
    attributes:
      label: 'Steps to Reproduce | 复现步骤'
      description: A clear and concise description of how to reproduce.
  - type: textarea
    attributes:
      label: 'Additional Info | 补充信息'
      description: Add any other context about the problem here.
